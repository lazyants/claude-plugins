[pytest]
# This project's test files are named `tests/<name>.test.py` (mirroring the
# *.test.js convention), not pytest's default `test_*.py`/`*_test.py` glob --
# so bare discovery needs an explicit pattern.
python_files = *.test.py

# pytest's default `--import-mode=prepend` derives a module's dotted name by
# stripping only the trailing `.py`, so `validate_draft.test.py` resolves to
# the dotted name `validate_draft.test` and Python tries (and fails) to
# import `validate_draft` as a package first. `importlib` mode loads each
# test file by its own file identity instead, sidestepping the collision.
addopts = --import-mode=importlib
