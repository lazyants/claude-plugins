# .claude/literary-translator/profile.yml
profile_version: 1                      # skill refuses unknown versions

project:
  title: "YOUR BOOK TITLE HERE"           # e.g. a real project's title: "Les Historiettes de Tallemant des Réaux, tome 3"
  durable_root: "/ABS/PATH/TO/YOUR_PROJECT"   # NOT scratchpad -- e.g. a real project: "/Users/you/dev/your-book-project"
                                          # profile_validate.py FATALLY REJECTS this literal placeholder string --
                                          # Step 0 cannot pass until this is replaced with a real path.
  durable_root_adopt_existing: false     # Optional, defaults false/absent. Step 0a's ownership-marker check
                                          # halts with an ADOPTION PROMPT, not a fatal error, when durable_root
                                          # already contains a generic managed-directory name (segments/, scripts/,
                                          # out/, etc.) with no plugin marker inside it -- a plausible, normal book
                                          # project's own unrelated folder, not necessarily a conflict. Set this to
                                          # true, explicitly, ONLY after confirming the existing directory is safe
                                          # for this plugin to also write into.
  pipeline_version: v1                   # bump on ANY schema/prompt/role change -> invalidates ledger cache
  max_segment_words: 15000               # FATAL preflight: extraction halts, naming the offending
                                          # segment(s), if any segment's word_count exceeds this -- v1 has NO
                                          # sub-chunking. v1's actual scope is works whose NATURAL segment/chapter
                                          # boundaries already fit under this cap -- a novel with
                                          # genuinely long natural chapters that exceed it is OUT OF SCOPE for v1,
                                          # not a "pre-split it yourself" quick fix; see the `custom` adapter for
                                          # the principled escape hatch (a co-designed extractor performing an
                                          # author-approved chapter split before this plugin ever sees the text).
                                          # Default is generous relative to a typical novella-scale chapter --
                                          # raise or lower per project, but never silently overflow.

source:
  format: gutenberg_epub                 # gutenberg_epub | plain_text | custom -- gutenberg_epub is the only
                                          # WORKING extractor; plain_text is SPECIFIED but not yet implemented
                                          # (#62) -- selecting it fails FATALLY at W2 today, see the note on its
                                          # adapter_config block below; custom is supported/experimental
                                          # (expert-mode, a co-designed extractor -- see custom.md).
  path: "/ABS/PATH/TO/YOUR_SOURCE.epub"  # profile_validate.py FATALLY REJECTS this literal placeholder too --
                                          # e.g. a real project: "/Users/you/Downloads/YourBook.epub". REQUIRED and
                                          # existence-checked for EVERY format, including `custom` -- for a `custom`
                                          # source consuming more than one file, this is the PRIMARY/representative
                                          # input (Step 0's own sanity anchor); the co-designed extractor's own
                                          # `manifest.json` `source_inputs[]` is the authoritative FULL file list,
                                          # which may include more than this one path -- see custom.md.
  gutenberg_id: null                     # optional, gutenberg_epub only -- set the real Gutenberg ebook ID if known
  language:
    code: fr                             # ISO-639-1, source language
    particle_config: "fr.json"           # BARE FILENAME ONLY, resolved as ${durable_root}/languages/<value> --
                                          # e.g. this resolves to ${durable_root}/languages/fr.json, copied there
                                          # by Step 0a (NOT assets/languages/, which is inside the plugin install
                                          # dir and may not be reachable at runtime). Never include a "languages/"
                                          # prefix here -- the resolution base already supplies that segment.
                                          # A project-local override (e.g. after a failed smoke test) lives in
                                          # this same ${durable_root}/languages/ directory, under a
                                          # DIFFERENT filename Step 0a never copies over (e.g. "fr.local.json").
                                          # This value must be a simple alphanumeric/dot/underscore/hyphen filename
                                          # ending in .json -- no path separators, no "..", no absolute path;
                                          # profile_validate.py fatally rejects any value that violates this,
                                          # naming the field.
                                          # `has_elision` (article-fusion handling, e.g. French `d'X`/`l'X`) is NOT
                                          # a profile field -- it lives in the resolved particle_config file itself
                                          # (${durable_root}/languages/<value>), which is the sole source of truth
                                          # for this and every other language-specific behavior. To change whether
                                          # a language elides, edit that file directly (or fork a `.local.json`
                                          # override).
    smoke_test:
      # Any NEW language preset -- even the proven, unmodified `fr.json` -- requires its own smoke test the FIRST
      # time it's used against a NEW source. `fr.json` is proven against Historiettes' own 17th-c. orthography and
      # vocabulary specifically, not against French prose in general -- reusing it for a different book still
      # requires a fresh smoke-test pass. The gate is keyed to a TRIPLE: this exact particle_config's content, this
      # exact project's own extracted-source-text sample, and the generating script's own identity, so a stale
      # report from an older script version or a different book's sample is never silently trusted. Only an EXACT
      # repeat run against the identical sample, config, and currently-installed script version (e.g. a
      # resumed/re-run session on the same project, no plugin update in between) can reuse a prior report.
      report_path: null
        # Path to a written smoke-test report proving the triple above matches. All hashing/comparison is
        # procedural, evaluated at W3 (after extraction produces manifest.json) -- Step 0 only validates this
        # field's SHAPE (a string or null). `null` means: derive `${project.durable_root}/runs/language-smoke-report.json`
        # fresh, every run -- nothing to persist. A project may instead set an explicit string here for a
        # non-default location; when set, it MUST be a bare path starting with "runs/" and containing no ".."
        # segment -- profile_validate.py fatally rejects any value that violates this.
  adapter_config:
    # Only the sub-block matching `source.format` is meaningful; the others are ignored -- safe to leave them
    # populated (as this example does, for illustration) or blanked to null. Whichever format is NOT active, its
    # own sub-block is validated for basic shape only, never its specialized rules -- those only become
    # load-bearing once that format is genuinely selected.
    gutenberg_epub:
      spine_overrides: {}       # optional: {"<file>": "body|footnote-defs|front-back"} per-file classification override
      frontback_overrides: {}  # optional: {"<FRONTBACK id>": "translate|regenerate|omit"} per-element decision override
    plain_text:
      # FORWARD-SPEC (#62): plain_text extraction is not yet implemented --
      # selecting `source.format: plain_text` fails FATALLY at W2 until #62
      # lands. The fields below document the intended shape only.
      segmentation:
        method: blank_line_run  # blank_line_run | heading_regex
        blank_line_threshold: 2 # blank_line_run only -- REQUIRED, a positive integer, when this method is active
        heading_regex: null     # heading_regex only -- REQUIRED, a compilable regex, when this method is active
      verse_detection: CHOOSE_none_confirmed_or_regex
        # Ships as an intentionally INVALID placeholder -- Step 0 fatally rejects it until you consciously replace
        # it with `none_confirmed` (this source has no verse) or `regex` (verse_regex below detects it). You MUST
        # replace this CHOOSE_ sentinel EVEN while a different format is active (as in this example, where
        # `plain_text` is inert): profile_validate.py's Step-0 placeholder scan rejects any surviving CHOOSE_
        # value anywhere in the profile regardless of `source.format`, by design -- the schema's enum check is
        # format-gated, so this scan is the format-agnostic backstop. Set it to a valid value (e.g.
        # `none_confirmed`) even though it is unused here; the enum's own legality and coupling rules (which
        # value is legal, whether verse_regex is required) only become load-bearing once you actually select
        # `source.format: plain_text`.
      verse_regex: null
        # Only meaningful, and then REQUIRED, when verse_detection: regex; ignored (must stay null) for
        # none_confirmed.
      footnotes: CHOOSE_none_confirmed_or_markdown_ref_or_custom_regex
        # Ships as an intentionally INVALID placeholder, identical discipline to verse_detection above. Replace
        # with `none_confirmed` (no footnotes), `markdown_ref` (standard `[^N]` + trailing endnote list), or
        # `custom_regex` (footnote_anchor_regex/footnote_def_regex below define your own convention) -- whichever
        # this source's own text genuinely calls for.
      footnote_anchor_regex: null   # required (and only meaningful) when footnotes: custom_regex
      footnote_def_regex: null      # required (and only meaningful) when footnotes: custom_regex
    custom:
      extractor_path: null
        # Only meaningful when `source.format: custom`. Path (relative to durable_root) to the hand-crafted Python
        # extractor this project co-designs with the skill (Step 0c, custom.md). `null` means co-design
        # hasn't happened yet -- Step 0c halts and starts that conversation; a non-null value must resolve to an
        # existing file under `${durable_root}/scripts/custom_extractors/<value>` (a bare relative filename, no
        # ".." segment, no absolute path -- e.g. `extractor_path: "my_book_extractor.py"`). The co-designed script
        # must produce a `manifest.json` matching every other adapter's exact output shape and pass the same
        # round-trip self-checks.

target:
  language:
    code: ru                             # ISO-639-1, target language
    register_notes: "ты/вы politeness distinction — see style_bible.md section B"
    # target languages without an analogous register axis (e.g. English) leave this
    # informational; style_bible.md section B says "if not applicable, delete this section"

verse_policy:
  mode: full_rhymed_plus_literal
    # full_rhymed_plus_literal | full_rhymed_only | rhythmic_approximation |
    # mixed_by_length | literal_only | skip   -- see references/verse-policy.md
  threshold_lines: null
    # REQUIRED (fatal at Step 0 if null/absent) only when mode: mixed_by_length;
    # ignored (must stay null) for every other mode -- nested under verse_policy so
    # the mode<->threshold coupling is structurally visible, not two independent
    # top-level keys a profile author could set inconsistently.

engine:
  # translator and reviewer are HARDCODED to codex in every shipped template
  # (translate_TASK.template.md, review_TASK.template.md,
  # mass-translate-wf.template.js) -- codex is the sole translate/review engine,
  # launched by the shipped detached codex_job.py driver (1.4.7), not the old
  # codex:codex-rescue forwarder; this is NOT a configurable swap point in v1.
  # The whole schema-validated, codex-only-translates/codex-only-reviews design is
  # load-bearing on that specific engine's behavior; letting a profile silently
  # point elsewhere would reintroduce exactly the failure mode this methodology
  # was built to eliminate.
  effort: high
    # low | medium | high | xhigh -- the accuracy-bearing effort tier. Excludes none/minimal (nonsensical for
    # accuracy work) and max (codex-companion's --effort flag throws "Unsupported reasoning effort" on it). This
    # single value drives THREE carriers, always in sync (never independently pinned): for W5 translate/review the
    # codex_job.py driver passes it to codex as a real --effort <value> CLI flag (the plain-Claude dispatcher that
    # launches the driver runs at effort:'low' regardless -- it only dispatches, it never translates/reviews); the
    # glossary-pass codex batch call and the Claude fix step both read this same value as their own agent()
    # effort option. Does NOT apply to purely mechanical, no-judgment calls: the translator-readiness poll and the
    # ledger-bookkeeping call are both effort:'low' by design.
  # model: gpt-5.3-codex   # optional codex model for W5 translate/review; unset = codex config default
  max_fix_rounds: 4                       # cap before escalating to non_converged / blocked
  batch_agent_cap: 3500
    # A worst-case agent-call-count ESTIMATE for this batch is computed before dispatch begins -- if the
    # estimate for the given SEGS array would exceed this cap, the run refuses to start, logging the estimate
    # and the offending segment count. Splitting a batch that's too large into smaller ones is the operator's
    # call, not automated in v1.
    # Calibration: mass-translate's worst case is 1 + N*(10 + 7*max_fix_rounds) = 1 + N*38 at the shipped
    # max_fix_rounds:4, so 3500 admits a normal ~78-segment batch (1+78*38 = 2965) with headroom. The old
    # default of 1000 refused any batch over 26 segments at max_fix_rounds:4 -- worse than a full novel needs.
    # Also read by the W3 glossary-pass preflight (estimate 3*BATCHES.length + 2), reusing this one knob.

footnotes:
  apparatus_policy: translate_all
    # translate_all | preserve_source | omit_apparatus | body_refs_only
    # -- see references/source-format-adapters/ (each adapter defines its own
    # behavior for all four values) and references/engine-loop.md.
    # This project's choice: translate 100% of the 19th-c. critical apparatus too
    # (translate_all).

glossary:
  research_mode: CHOOSE_live_or_offline  # Ships as an intentionally INVALID placeholder.
                                          # REQUIRED, no default -- live | offline. The explicit, human-set
                                          # precondition for whether THIS run's glossary-pass codex agent actually
                                          # has working web/research access -- the orchestrating Claude session is
                                          # the only party that actually knows this about its own environment, so
                                          # it's a declared precondition, never something a script silently probes
                                          # and gets wrong. Under `offline`, basis:"established" is FATALLY
                                          # forbidden for every canon entry this run produces -- candidates that
                                          # would otherwise warrant it get basis:"transliterated" or are routed to
                                          # review_queue instead, tagged with a SOURCE_UNAVAILABLE: note. A
                                          # candidate needing basis:"sense_translated" (a deliberate,
                                          # project-specific sense-rendering of a speaking name -- see
                                          # style_bible.md section G) is unaffected either way: it never claims
                                          # a citable source, in live or offline mode alike. Replace
                                          # with `live` or `offline`, consciously, matching THIS run's own actual
                                          # environment.

validation:
  untranslated_sentinel: "нет перевода"
    # validate_draft.py reads THIS field rather than a hardcoded literal -- a target-language-
    # appropriate marker a translator agent uses/leaves behind for "not yet translated," which the false-green
    # gate scans for verbatim.

output:
  v1_scope: segment_drafts_and_audit
    # segment_drafts_and_audit | assembled_book -- the default, segment_drafts_and_audit, delivers converged
    # per-segment drafts + ledger + each draft's own validate_draft.py per-segment audit trail + a whole-book
    # final_audit.py summary/WARN report -- NOT a single assembled book file. destination below is where the
    # audit/handoff package (not a book) is written. Setting this to `assembled_book` is LOAD-BEARING: it turns
    # on Step 0d + W9 Assemble, which reconstruct the converged drafts into one rendered book via the
    # `target` adapter below (see references/assembly-and-output.md) -- gated on W7's project_complete: true.
  destination: "/ABS/PATH/TO/YOUR_PROJECT/out/"   # matches durable_root's placeholder above + /out/ (the default,
                                          # resolving inside durable_root); e.g. a real project:
                                          # "/Users/you/dev/your-book-project/out/"
  target: obsidian
    # obsidian | epub | custom -- which output-target adapter renders the assembled book; only ever consulted
    # when v1_scope: assembled_book. `obsidian` is the one target this increment actually ships and renders,
    # via scripts/render_obsidian.py -- a vault of narrative pages plus one cross-linked entity note per
    # canon.json entry. `epub` resolves (Step 0d validates the enum) but has no renderer behind it yet (see
    # references/assembly-and-output.md's "Why build_epub.py hasn't been generalized"). `custom` also resolves
    # but always requires this project to co-design its own renderer first (adapter_config.custom.renderer_path).
  name_display:
    parenthetical_originals: never
      # never | first_occurrence -- whether a name's original-script form is shown parenthetically alongside
      # its target-language rendering the first time it occurs. Only consulted by the obsidian adapter at
      # render time, i.e. only under v1_scope: assembled_book; inert under the default segment_drafts_and_audit.
  index:
    enabled: false
      # A separate, generated occurrence-index PAGE -- a still-later-phase feature, not yet built for any
      # target -- OFF by default; a plain translate+gloss job never pays for it. The obsidian target already
      # gets an occurrence index for free via its native backlinks panel regardless of this setting (see
      # references/output-target-adapters/obsidian.md), so this knob stays irrelevant there too until that
      # later phase ships.
    person_grouping: false
      # Opt-in lightweight name-grouping for the index. REQUIRES index.enabled: true (schema-enforced) --
      # setting this true while enabled is false/absent is a validation error.
  adapter_config:
    # Per-target settings for the assembler -- only the sub-block matching `target` above is meaningful;
    # the others sit inert. Field-level shape validation is real for obsidian/custom (see below); epub
    # stays intentionally loose (any object) until its own Phase ships.
    obsidian:
      folders: {}
        # Optional category -> folder catalog for entity-note placement (e.g. {"person": "people",
        # "place": "places", "work": "works"}) -- OPEN, per-project vocabulary declared here, NOT a
        # hardcoded schema enum (see references/output-target-adapters/obsidian.md for preset examples
        # to copy from). A category absent from this map (or left {} entirely, as here) routes to an
        # "other" folder -- never a hard failure.
      mentions_section:
        enabled: true
          # ON BY DEFAULT (an absent mentions_section block, or an absent/null enabled key, all resolve
          # to enabled too -- this explicit block just keeps the shipped example self-documenting rather
          # than activating the feature by absence). Emits a source-anchored "## Mentions" occurrence
          # index in each entity note and engages collision de-linking; the advisory validate_backlinks.py
          # W9 gate also runs. Set to false to opt out (byte-identical to pre-1.10.0 output). See
          # references/output-target-adapters/obsidian.md.
    epub: null
    custom:
      renderer_path: null
        # Bare relative filename (no path separators beyond what's needed, no ".." segment, no leading
        # "/"), resolved as ${durable_root}/scripts/custom_renderers/<value>. Only meaningful when
        # target: custom. null means the custom renderer hasn't been co-designed yet --
        # output_resolve.py halts for that conversation rather than silently guessing.
  # future (v2+): bilingual-output layout logic (bilingual_epub | plain_text_master) is a plausible later
  # addition, but only once the `epub` target itself exists and renders (see
  # references/assembly-and-output.md's "Also out of scope for this increment").
